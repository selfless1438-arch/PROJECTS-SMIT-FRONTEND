<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>15 April</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="favicon.jpg" type="image/x-icon">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <main>
        <div class="toggle">
            <button onclick="toggleMode()" type="button">Mode</button>
        </div>
        <div class="profile-card" id="card">
            <div class="profile-img">
                <img src="favicon.jpg" alt="favicon">
            </div>
            <div class="content">
                <h3>Danish Ameer <i data-lucide="badge-check"></i></h3>
                <p class="desc">Fullstack Developer | Converting ideas to reality & grow up businesses.</p>
                <div class="bottom">
                    <span class="follows">
                        <i data-lucide="user"></i> 312
                    </span>
                    <span class="img">
                        <i data-lucide="user"></i> 48
                    </span>
                    <button>
                        Follow <i data-lucide="plus"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>

</html>
